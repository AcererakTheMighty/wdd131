<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph -->
  <meta property="og:type" content="website">

<body>

<div class="card">
  <img src="img/swamp-beast.png" alt="Swamp Beast Diplomat" class="image">

  <div class="name" id="charName"></div>

  <div class="stats">

    <p><strong>Health:</strong> <span id="charHealth"></span></p>

  <div class="buttons">
    <button onclick="character.attacked()">Attack</button>
    <button onclick="character.levelUp()">Level Up</button>
  </div>
</div>

<script src="script.js"></script>
