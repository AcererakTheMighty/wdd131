<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VTM Dice Roller</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <img src="vtmlogo.jpeg" alt="VTM Logo" class="logo">

    <h1>VTM Dice Roller</h1>

    <p class="description">
      This tool simulates dice rolls for Vampire: The Masquerade. 
      Roll a pool of d10 dice where results of 6+ count as successes, 
      and 10s count as critical successes.
    </p>

    <label>Number of Dice:</label>
    <input type="number" id="diceCount" min="1" max="20" value="5">

    <button id="rollBtn">Roll Dice</button>

    <div id="results"></div>
    <div id="summary"></div>
  </div>

  <script src="final.js"></script>
</body>
</html>
